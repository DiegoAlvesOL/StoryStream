<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StoryStream | Seleção Premium</title>
    <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>

<header class="global_navigation_bar">
    <div class="navigation_left_section">
        <h1 class="project_brand_logo">StoryStream</h1>
    </div>
    <div class="navigation_right_section">
        <button class="button_interface_base">Login</button>
        <button class="button_interface_base">Register</button>
    </div>
</header>

<main class="fixed_selection_wrapper">
    <section class="carousel_transformation_platform" id="main_category_rotation_platform">

        <article class="category_card_face card_face_front" id="trigger_movies_page">
            <h2 class="category_card_title">Movies</h2>
            <p class="category_card_subtitle">Scroll down to switch | Click to enter</p>
        </article>

        <article class="category_card_face card_face_back" id="trigger_books_page">
            <h2 class="category_card_title">Books</h2>
            <p class="category_card_subtitle">Scroll up to switch | Click to enter</p>
        </article>

    </section>
</main>

<script src="index.js"></script>
</body>
</html>
